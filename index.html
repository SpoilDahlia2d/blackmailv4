<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL OVERRIDE</title>
    <link rel="stylesheet" href="globals.css">
</head>
<body>
    <!-- Background Media -->
    <video autoplay loop muted playsinline id="bg-video">
        <source src="bg.mp4" type="video/mp4">
    </video>
    <audio loop id="bg-audio">
        <source src="bg.mp3" type="audio/mpeg">
    </audio>

    <div class="crt relative min-h-screen overflow-hidden font-mono p-4 sm:p-8 flex items-center justify-center">
        <!-- Luxury Frosted Glass Interrogation Box -->
        <div class="glass-panel w-full max-w-4xl h-[80vh] flex flex-col pt-8 pb-10 px-4 sm:px-8 overflow-y-auto">
            
            <div id="history-container" class="mb-auto space-y-4 whitespace-pre-wrap">
                <!-- Previous questions and answers will be injected here -->
            </div>
            
            <div id="current-question-container" class="relative mt-8 sticky bottom-0 bg-transparent">
                <p id="glitch-text" class="text-xl sm:text-2xl font-bold mb-3"></p>
                <div class="flex items-center gap-2">
                    <span class="text-pink-500 font-bold">></span>
                    <input 
                        type="text" 
                        id="terminal-input"
                        class="w-full bg-transparent border-none outline-none text-xl font-mono focus:ring-0"
                        autofocus
                        autocomplete="off"
                        spellcheck="false"
                        disabled
                    />
                </div>
                <p id="error-message" class="text-red-500 mt-2 text-sm hidden uppercase animate-pulse">ERROR</p>
            </div>
        </div>
    </div>
    
    <script src="logic.js"></script>
</body>
</html>
